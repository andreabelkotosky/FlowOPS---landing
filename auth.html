<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <!-- Incluir fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Archivo CSS principal (contiene base y variables) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <div class="auth-container">
        <!-- Logo Header -->
        <a href="index.html" style="text-decoration: none;">
            <div class="auth-logo">
                Flow<span>OPS</span>
            </div>
        </a>

        <!-- Tarjeta de Autenticación -->
        <div class="auth-card" id="authCard">

            <h2 id="authTitle">Crear Cuenta</h2>
            <p id="authSubtitle">Únete a FlowOPS hoy mismo.</p>

            <!-- Agregamos un div para mostrar mensajes de error -->
            <div id="authError"
                style="display: none; color: #DC2626; background: #FEF2F2; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; border: 1px solid #FCA5A5; text-align: center;">
            </div>

            <form id="authForm">

                <div class="input-group" id="nameGroup"
                    style="display: block; opacity: 1; transition: opacity 0.3s ease;">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submitBtn">Registrarse</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggleLink">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>

        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- 1. CONFIGURACIÓN DE SUPABASE ---
        // INSTRUCCIÓN: Reemplaza estas dos variables con los datos de tu proyecto en Supabase
        const SUPABASE_URL = 'https://shbisaggioybktfnjowl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- 2. VARIABLES DE LA INTERFAZ ---
        const toggleLink = document.getElementById('toggleLink');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const authBtn = document.getElementById('submitBtn');
        const nameGroup = document.getElementById('nameGroup');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authCard = document.getElementById('authCard');
        const authError = document.getElementById('authError');

        let isLogin = false; // Por defecto empezamos en Registro

        // Configuración inicial de la vista de Registro
        authTitle.textContent = "Crear Cuenta";
        authSubtitle.textContent = "Únete a FlowOPS hoy mismo.";
        authBtn.textContent = "Registrarse";
        toggleLink.textContent = "¿Ya tienes cuenta? Inicia sesión aquí";
        nameGroup.style.display = 'block';
        nameGroup.style.opacity = '1';
        nameInput.required = true;

        // --- 3. LÓGICA DE INTERCAMBIO DE VISTAS (TOGGLE) ---
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;

            // Limpiar errores previos
            authError.style.display = 'none';
            authError.textContent = '';

            // Pequeña animación de la tarjeta
            authCard.style.transform = 'scale(0.98)';
            setTimeout(() => {
                authCard.style.transform = 'scale(1)';
            }, 150);

            if (isLogin) {
                // Modo Login
                authTitle.textContent = "Iniciar Sesión";
                authSubtitle.textContent = "Ingresa a tu cuenta de FlowOPS.";
                authBtn.textContent = "Entrar";
                toggleLink.textContent = "¿No tienes cuenta? Regístrate aquí";

                nameGroup.style.opacity = '0';
                setTimeout(() => {
                    nameGroup.style.display = 'none';
                    nameInput.required = false;
                }, 300);
            } else {
                // Modo Registro
                authTitle.textContent = "Crear Cuenta";
                authSubtitle.textContent = "Únete a FlowOPS hoy mismo.";
                authBtn.textContent = "Registrarse";
                toggleLink.textContent = "¿Ya tienes cuenta? Inicia sesión aquí";

                nameGroup.style.display = 'block';
                nameInput.required = true;
                // Pequeño delay para que la transición de opacidad funcione
                setTimeout(() => {
                    nameGroup.style.opacity = '1';
                }, 10);
            }
        });

        // --- 4. FUNCIÓN PARA MOSTRAR ERRORES ---
        function showError(message) {
            authError.textContent = message;
            authError.style.display = 'block';

            // Restaurar el botón original si hubo error
            authBtn.innerHTML = isLogin ? 'Entrar' : 'Registrarse';
            authBtn.style.opacity = '1';
            authBtn.disabled = false;
        }

        // --- 5. LÓGICA DE AUTENTICACIÓN ---
        document.getElementById('authForm').addEventListener('submit', async function (e) {
            e.preventDefault(); // Evitamos el envío clásico para usar JS

            // Ocultar mensajes de error anteriores
            authError.style.display = 'none';
            authError.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const fullName = nameInput.value.trim();

            // Interfaz de "Procesando"
            authBtn.innerHTML = '<span style="display:inline-block; animation: spin 1s linear infinite;">↻</span> Procesando...';
            authBtn.style.opacity = '0.8';
            authBtn.disabled = true;

            try {
                if (!isLogin) {
                    // ====== FLUJO DE REGISTRO ======
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: {
                                full_name: fullName
                            }
                        }
                    });

                    if (error) throw error;

                    // Supabase a veces requiere verificación de correo. Si se crea sin problema:
                    window.location.href = 'dashboard.html';

                } else {
                    // ====== FLUJO DE INICIO DE SESIÓN ======
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        if (error.message === 'Invalid login credentials') {
                            throw new Error('Usuario no encontrado, por favor regístrate');
                        }
                        throw error;
                    }

                    // Éxito en el login:
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.error("Error en auth:", err.message);
                showError(err.message);
            }
        });
    </script>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
