<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">Flow<span>OPS</span></div>

        <div class="auth-card">
            <h2 id="auth-title">Registrate</h2>
            <p id="auth-subtitle">Crea tu cuenta para empezar.</p>

            <form id="auth-form">
                <div class="input-group" id="nombre-group">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" placeholder="Ej. Juan Pérez">
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">Registrarte</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // 1. Configuración de tu base de datos Supabase
        const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleLink = document.getElementById('toggle-link');
        const nombreGroup = document.getElementById('nombre-group');
        const nombreInput = document.getElementById('name');
        const authForm = document.getElementById('auth-form');

        // 2. LÓGICA PARA CAMBIAR ENTRE REGISTRO E INICIO DE SESIÓN
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            
            if (authTitle.innerText === 'Registrate') {
                // CAMBIAR A MODO: INICIAR SESIÓN
                authTitle.innerText = 'Iniciar sesión';
                authSubtitle.innerText = 'Ingresa tus credenciales para entrar.';
                submitBtn.innerText = 'Entrar';
                toggleLink.innerText = '¿No tienes cuenta? Regístrate aquí';
                nombreGroup.style.display = 'none'; // OCULTA EL NOMBRE
                nombreInput.required = false;
            } else {
                // CAMBIAR A MODO: REGISTRATE
                authTitle.innerText = 'Registrate';
                authSubtitle.innerText = 'Crea tu cuenta para empezar.';
                submitBtn.innerText = 'Registrarte';
                toggleLink.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                nombreGroup.style.display = 'block'; // MUESTRA EL NOMBRE
                nombreInput.required = true;
            }
        });

        // 3. LÓGICA DE ENVÍO (REGISTRAR O ENTRAR)
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (authTitle.innerText === 'Registrate') {
                // ACCIÓN: REGISTRAR USUARIO
                const fullName = nombreInput.value;
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: fullName } }
                });

                if (error) {
                    alert("Error al registrar: " + error.message);
                } else {
                    alert("¡Cuenta creada con éxito! Ahora puedes iniciar sesión.");
                    // Opcional: cambiar automáticamente a la vista de login
                    toggleLink.click();
                }
            } else {
                // ACCIÓN: INICIAR SESIÓN (ENTRAR AL DASHBOARD)
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    alert("Error: Correo o contraseña incorrectos.");
                } else {
                    // SI TODO ES CORRECTO, ENTRA AL DASHBOARD
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
