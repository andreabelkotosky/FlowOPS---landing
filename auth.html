<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <!-- Incluir fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Archivo CSS principal (contiene base y variables) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <div class="auth-container">
        <!-- Logo Header -->
        <a href="index.html" style="text-decoration: none;">
            <div class="auth-logo">
                Flow<span>OPS</span>
            </div>
        </a>

        <!-- Tarjeta de Autenticación -->
        <div class="auth-card" id="authCard">

            <h2 id="auth-title">Crear Cuenta</h2>
            <p id="authSubtitle">Únete a FlowOPS hoy mismo.</p>

            <!-- Agregamos un div para mostrar mensajes de error -->
            <div id="authError"
                style="display: none; color: #DC2626; background: #FEF2F2; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; border: 1px solid #FCA5A5; text-align: center;">
            </div>

            <form id="authForm">

                <div class="input-group" id="nombre-field"
                    style="display: block; opacity: 1; transition: opacity 0.3s ease;">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="auth-button">Registrarse</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>

        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // 1. Conexión con Supabase
const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

// 2. Función que hace la magia del cambio
document.addEventListener('DOMContentLoaded', () => {
    const enlace = document.getElementById('toggle-link');
    const campoNombre = document.getElementById('nombre-field');
    const titulo = document.getElementById('auth-title');
    const botonPrincipal = document.getElementById('auth-button');

    enlace.addEventListener('click', (e) => {
        e.preventDefault(); // Esto evita que la página se recargue y se quede igual
        
        if (titulo.innerText === 'Crear Cuenta') {
            // --- MODO LOGIN ---
            titulo.innerText = 'Iniciar Sesión';
            botonPrincipal.innerText = 'Entrar';
            enlace.innerText = '¿No tienes cuenta? Regístrate aquí';
            campoNombre.style.setProperty('display', 'none', 'important'); // Forzamos la desaparición
        } else {
            // --- MODO REGISTRO ---
            titulo.innerText = 'Crear Cuenta';
            botonPrincipal.innerText = 'Registrarse';
            enlace.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
            campoNombre.style.setProperty('display', 'block', 'important'); // Forzamos la aparición
        }
    });
});
    </script>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
