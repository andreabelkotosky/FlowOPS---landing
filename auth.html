<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Acceso</title>
    <style>
        /* Estilos de emergencia para asegurar que funcione */
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 0.75rem; background: #4F46E5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .auth-toggle { margin-top: 1.5rem; text-align: center; }
        #link-switch { color: #4F46E5; text-decoration: none; cursor: pointer; font-size: 0.9rem; }
        
        /* Clase para ocultar el nombre */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2 id="auth-title">Crear Cuenta</h2>
        <p id="auth-subtitle">Regístrate para empezar.</p>

        <form id="main-form">
            <div id="group-nombre" class="input-group">
                <label>Nombre Completo</label>
                <input type="text" id="input-name" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" id="input-email" required>
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="input-password" required>
            </div>

            <button type="submit" class="auth-btn" id="btn-principal">Registrarse</button>
        </form>

        <div class="auth-toggle">
            <a id="link-switch">¿Ya tienes cuenta? Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        const titulo = document.getElementById('auth-title');
        const btn = document.getElementById('btn-principal');
        const link = document.getElementById('link-switch');
        const nombreDiv = document.getElementById('group-nombre');
        const nombreInput = document.getElementById('input-name');

link.onclick = function(e) {
    e.preventDefault();
    
    if (titulo.innerText === 'Crear Cuenta') {
        // --- ESTO ACTIVA EL MODO DE TU FOTO ---
        titulo.innerText = 'Iniciar Sesión';
        subtitulo.innerText = 'Regístrate para empezar.'; // Texto de tu captura
        btn.innerText = 'Entrar';
        link.innerText = '¿No tienes cuenta? Regístrate aquí';
        
        nombreDiv.style.display = 'none'; // Esconde el nombre
        nombreInput.required = false;
    } 
    else {
        // --- ESTO REGRESA AL MODO REGISTRO ---
        titulo.innerText = 'Crear Cuenta';
        subtitulo.innerText = 'Únete a FlowOPS hoy mismo.';
        btn.innerText = 'Registrarse';
        link.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
        
        nombreDiv.style.display = 'block'; // Muestra el nombre
        nombreInput.required = true;
    }
};
    </script>
</body>
</html>
