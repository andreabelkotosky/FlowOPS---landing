<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">Flow<span>OPS</span></div>

        <div class="auth-card">
            <h2 id="auth-title">Crear Cuenta</h2>
            <p id="auth-subtitle">Únete a FlowOPS hoy mismo.</p>

            <form id="main-form">
                <div class="input-group" id="group-nombre">
                    <label>Nombre Completo</label>
                    <input type="text" id="input-name" placeholder="Ej. Juan Pérez">
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="input-email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="input-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="btn-principal">Registrarse</button>
            </form>

            <div class="auth-toggle" style="margin-top: 20px; text-align: center;">
                <a href="#" id="link-switch" style="color: #4F46E5; text-decoration: none; font-size: 14px;">
                    ¿Ya tienes cuenta? Inicia sesión aquí
                </a>
            </div>
        </div>
    </div>

    <script>
        const titulo = document.getElementById('auth-title');
        const subtitulo = document.getElementById('auth-subtitle');
        const btnPrincipal = document.getElementById('btn-principal');
        const linkSwitch = document.getElementById('link-switch');
        const grupoNombre = document.getElementById('group-nombre');
        const inputNombre = document.getElementById('input-name');

        linkSwitch.addEventListener('click', (e) => {
            e.preventDefault(); // Evita que la página se recargue

            if (titulo.innerText === 'Crear Cuenta') {
                // PASAR A MODO INICIAR SESIÓN
                titulo.innerText = 'Iniciar Sesión';
                subtitulo.innerText = 'Ingresa tus credenciales para acceder.';
                btnPrincipal.innerText = 'Entrar';
                linkSwitch.innerText = '¿No tienes cuenta? Regístrate aquí';
                
                // OCULTAR NOMBRE
                grupoNombre.style.display = 'none';
                inputNombre.required = false;
            } else {
                // PASAR A MODO REGISTRO
                titulo.innerText = 'Crear Cuenta';
                subtitulo.innerText = 'Únete a FlowOPS hoy mismo.';
                btnPrincipal.innerText = 'Registrarse';
                linkSwitch.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                
                // MOSTRAR NOMBRE
                grupoNombre.style.display = 'block';
                inputNombre.required = true;
            }
        });

        // Lógica del botón (Por ahora solo para probar que funcione la interfaz)
        document.getElementById('main-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (titulo.innerText === 'Iniciar Sesión') {
                alert('Aquí el código validará tu correo y contraseña para entrar al Dashboard.');
            } else {
                alert('Aquí el código guardará tu nombre, correo y contraseña en la base de datos.');
            }
        });
    </script>
</body>
</html>
