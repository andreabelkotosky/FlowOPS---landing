<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">Flow<span>TEST</span></div>

        <div class="auth-card">
            <h2 id="auth-title">Registrate</h2>
            <p id="auth-subtitle">Crea tu cuenta para empezar.</p>

            <form id="auth-form">
                <div class="input-group" id="nombre-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="name" placeholder="Ej. Juan Pérez">
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">Registrarte</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('submit-btn');
            const link = document.getElementById('toggle-link');
            const nombreGroup = document.getElementById('nombre-group');

            // LA FUNCIÓN QUE CORRIGE LO QUE OBSERVASTE
            link.onclick = function(e) {
                e.preventDefault();

                if (title.innerText === 'Registrate') {
                    // MODO: INICIAR SESIÓN (Tu segunda captura)
                    title.innerText = 'Iniciar sesión';
                    subtitle.innerText = 'Ingresa tu correo y contraseña.';
                    btn.innerText = 'Entrar';
                    link.innerText = '¿No tienes cuenta? Regístrate aquí';
                    nombreGroup.style.display = 'none'; // Escondemos el nombre
                } else {
                    // MODO: REGISTRATE (Tu primera captura)
                    title.innerText = 'Registrate';
                    subtitle.innerText = 'Crea tu cuenta para empezar.';
                    btn.innerText = 'Registrarte';
                    link.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                    nombreGroup.style.display = 'block'; // Mostramos el nombre
                }
            };

            // Manejo de los formularios (Registro vs Login)
            document.getElementById('auth-form').onsubmit = async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (title.innerText === 'Registrate') {
                    // Lógica para Crear Cuenta
                    const { error } = await supabase.auth.signUp({
                        email, password, options: { data: { full_name: document.getElementById('name').value } }
                    });
                    if (error) alert(error.message);
                    else alert("¡Registro exitoso!");
                } else {
                    // Lógica para Entrar (Dashboard)
                    const { error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) alert("Correo o contraseña incorrectos");
                    else window.location.href = 'dashboard.html';
                }
            };
        });
    </script>
</body>
</html>
