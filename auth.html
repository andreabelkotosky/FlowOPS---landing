<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <a href="index.html" style="text-decoration: none;">
            <div class="auth-logo">Flow<span>OPS</span></div>
        </a>

        <div class="auth-card">
            <h2 id="auth-title">Crear Cuenta</h2>
            <p id="auth-subtitle">Únete a FlowOPS hoy mismo.</p>

            <form id="auth-form">
                <div class="input-group" id="nombre-field">
                    <label>Nombre Completo</label>
                    <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="auth-button">Registrarse</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-button');
        const toggleLink = document.getElementById('toggle-link');
        const nombreField = document.getElementById('nombre-field');
        const authForm = document.getElementById('auth-form');

        // LA MAGIA DEL CAMBIO
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            
            if (authTitle.innerText === 'Crear Cuenta') {
                authTitle.innerText = 'Iniciar Sesión';
                authBtn.innerText = 'Entrar';
                toggleLink.innerText = '¿No tienes cuenta? Regístrate aquí';
                nombreField.style.display = 'none';
                document.getElementById('name').required = false;
            } else {
                authTitle.innerText = 'Crear Cuenta';
                authBtn.innerText = 'Registrarse';
                toggleLink.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                nombreField.style.display = 'block';
                document.getElementById('name').required = true;
            }
        });

        // ENVÍO DE FORMULARIO
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (authTitle.innerText === 'Crear Cuenta') {
                const name = document.getElementById('name').value;
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if (error) alert(error.message);
                else alert("Registro exitoso. ¡Inicia sesión!");
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Usuario no encontrado o datos incorrectos");
                else window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
