<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">Flow<span>OPS</span></div>

        <div class="auth-card">
            <h2 id="auth-title">Registrate</h2>
            <p id="auth-subtitle">Crea tu cuenta para empezar.</p>

            <form id="auth-form">
                <div class="input-group" id="nombre-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="name" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="submit-btn">Registrarte</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

            const authTitle = document.getElementById('auth-title');
            const authSubtitle = document.getElementById('auth-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const toggleLink = document.getElementById('toggle-link');
            const nombreGroup = document.getElementById('nombre-group');
            const nombreInput = document.getElementById('name');
            const authForm = document.getElementById('auth-form');

            // LA LÓGICA DE REDIRECCIÓN INTERNA (EL INTERRUPTOR)
            toggleLink.onclick = function(e) {
                e.preventDefault();

                if (authTitle.innerText === 'Registrate') {
                    // CONFIGURACIÓN PARA INICIAR SESIÓN (Lo que quieres ver al picarle)
                    authTitle.innerText = 'Iniciar sesión';
                    authSubtitle.innerText = 'Ingresa tu correo y contraseña.';
                    submitBtn.innerText = 'Entrar';
                    toggleLink.innerText = '¿No tienes cuenta? Regístrate aquí';
                    
                    nombreGroup.style.display = 'none'; // Desaparece el nombre
                    nombreInput.required = false;
                } else {
                    // CONFIGURACIÓN PARA REGISTRARTE
                    authTitle.innerText = 'Registrate';
                    authSubtitle.innerText = 'Crea tu cuenta para empezar.';
                    submitBtn.innerText = 'Registrarte';
                    toggleLink.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                    
                    nombreGroup.style.display = 'block'; // Aparece el nombre
                    nombreInput.required = true;
                }
            };

            // LÓGICA DE OBJETIVOS (REGISTRAR O ENTRAR)
            authForm.onsubmit = async function(e) {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (authTitle.innerText === 'Registrate') {
                    // OBJETIVO: REGISTRAR (Guardar info)
                    const { error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: { data: { full_name: nombreInput.value } }
                    });
                    if (error) alert("Error: " + error.message);
                    else alert("¡Cuenta creada! Ahora inicia sesión.");
                } else {
                    // OBJETIVO: INICIAR SESIÓN (Verificar y entrar al Dashboard)
                    const { error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });
                    if (error) alert("Correo o contraseña incorrectos.");
                    else window.location.href = 'dashboard.html'; // ENTRADA AL DASHBOARD
                }
            };
        });
    </script>
</body>
</html>
