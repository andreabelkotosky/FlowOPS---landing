<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowOPS - Autenticación</title>
    <!-- Incluir fuente Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <!-- Archivo CSS principal (contiene base y variables) -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <div class="auth-container">
        <!-- Logo Header -->
        <a href="index.html" style="text-decoration: none;">
            <div class="auth-logo">
                Flow<span>OPS</span>
            </div>
        </a>

        <!-- Tarjeta de Autenticación -->
        <div class="auth-card" id="authCard">

            <h2 id="auth-title">Crear Cuenta</h2>
            <p id="authSubtitle">Únete a FlowOPS hoy mismo.</p>

            <!-- Agregamos un div para mostrar mensajes de error -->
            <div id="authError"
                style="display: none; color: #DC2626; background: #FEF2F2; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 20px; border: 1px solid #FCA5A5; text-align: center;">
            </div>

            <form id="authForm">

                <div class="input-group" id="nombre-field"
                    style="display: block; opacity: 1; transition: opacity 0.3s ease;">
                    <label for="name">Nombre Completo</label>
                    <input type="text" id="name" name="name" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="auth-button">Registrarse</button>
            </form>

            <div class="auth-toggle">
                <a href="#" id="toggle-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>

        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
       // 1. Configuración de Supabase
        const supabase = window.supabase.createClient('https://shbisaggioybktfnjowl.supabase.co', 'sb_publishable_zTyAOnvuO4g66DCPy-dtyQ_y7wLv9TF');

        // 2. Selección de elementos (Asegúrate que los IDs coincidan en tu HTML)
        const authTitle = document.getElementById('auth-title');
        const authButton = document.getElementById('auth-button');
        const toggleLink = document.getElementById('toggle-link');
        const nombreField = document.getElementById('nombre-field');
        const authForm = document.getElementById('authForm'); // Usamos el ID que ya tienes

        // 3. El interruptor (Switch) para cambiar de Registro a Login
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault(); // Evita que la página se recargue
            
            if (authTitle.innerText === 'Crear Cuenta') {
                authTitle.innerText = 'Iniciar Sesión';
                authButton.innerText = 'Entrar';
                toggleLink.innerText = '¿No tienes cuenta? Regístrate aquí';
                nombreField.style.display = 'none'; // Desaparece el nombre
            } else {
                authTitle.innerText = 'Crear Cuenta';
                authButton.innerText = 'Registrarse';
                toggleLink.innerText = '¿Ya tienes cuenta? Inicia sesión aquí';
                nombreField.style.display = 'block'; // Aparece el nombre
            }
        });

        // 4. Lógica de envío para que funcione el botón
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (authTitle.innerText === 'Crear Cuenta') {
                const name = document.getElementById('name').value;
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if (error) alert(error.message);
                else alert("¡Registro exitoso! Ya puedes iniciar sesión.");
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert("Usuario no encontrado o datos incorrectos");
                else window.location.href = 'dashboard.html';
            }
        });
    </script>

    <style>
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
